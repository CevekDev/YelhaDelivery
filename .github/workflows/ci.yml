name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Exécute les actions JS (checkout, setup-node, pnpm) sur le runtime Node 24
  # (Node 20 est déprécié sur les runners GitHub).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Placeholders pour permettre au build de passer ; les valeurs réelles
      # vivent dans les variables d'environnement Vercel.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: Build
        run: pnpm build
